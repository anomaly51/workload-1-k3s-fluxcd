apiVersion: apps/v1
kind: Deployment
metadata:
  name: shisha-frontend
  namespace: shisha-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shisha-frontend
  template:
    metadata:
      labels:
        app: shisha-frontend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: shisha-frontend
          image: harbor.api-api-api.com/shisha/frontend:main-6-7a3b4a37a37cb666ae4c73a449df12d8dfd8680e # {"$imagepolicy": "flux-system:shisha-frontend"}
          ports:
            - containerPort: 80
