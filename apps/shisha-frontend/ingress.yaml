apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shisha-frontend
  namespace: shisha-frontend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/hostname: shisha-guid.api-api-api.com
    external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - shisha-guid.api-api-api.com
      secretName: shisha-frontend-tls
  rules:
    - host: shisha-guid.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shisha-frontend
                port:
                  number: 80
