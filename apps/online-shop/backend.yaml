apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-static
  namespace: online-shop
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: nfs-client
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: online-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-shop-backend
  template:
    metadata:
      labels:
        app: online-shop-backend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: migrate
          image: harbor.api-api-api.com/online-shop/backend:main-5-4a8436b92412aca5c79a3a389c3cc0b001e97808 # {"$imagepolicy": "flux-system:online-shop-backend"}
          command:
            - sh
            - -c
            - |
              until python - <<'PY'
              import socket
              s = socket.create_connection(("postgres.online-shop.svc.cluster.local", 5432), 2)
              s.close()
              PY
              do
                sleep 2
              done
              alembic upgrade head
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: app_db
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "7"
            - name: APP_BASE_URL
              value: https://online-shop-api.api-api-api.com
            - name: GOOGLE_CLIENT_ID
              value: 348661487643-vhgu2h4af8tm3h842ju7f4gtdkcg7k5t.apps.googleusercontent.com
            - name: ENVIRONMENT
              value: production
      containers:
        - name: backend
          image: harbor.api-api-api.com/online-shop/backend:main-5-4a8436b92412aca5c79a3a389c3cc0b001e97808 # {"$imagepolicy": "flux-system:online-shop-backend"}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: app_db
            - name: CORS_ORIGINS
              value: https://online-shop.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "7"
            - name: APP_BASE_URL
              value: https://online-shop-api.api-api-api.com
            - name: GOOGLE_CLIENT_ID
              value: 348661487643-vhgu2h4af8tm3h842ju7f4gtdkcg7k5t.apps.googleusercontent.com
            - name: ENVIRONMENT
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: static
              mountPath: /code/static/uploads
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: backend-static
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: online-shop
spec:
  selector:
    app: online-shop-backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: online-shop
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/hostname: online-shop-api.api-api-api.com
    external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - online-shop-api.api-api-api.com
      secretName: online-shop-api-tls
  rules:
    - host: online-shop-api.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
