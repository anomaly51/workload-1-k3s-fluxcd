apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: shisha-guid
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: "workload-1/shisha-guid-backend"
        property: "database_url"
    - secretKey: SECRET_KEY
      remoteRef:
        key: "workload-1/shisha-guid-backend"
        property: "secret_key"
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: "workload-1/shisha-guid-backend"
        property: "google_client_id"
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: "workload-1/shisha-guid-backend"
        property: "google_client_secret"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: shisha-guid
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.api-api-api.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: "shared/harbor"
        property: "username"
    - secretKey: password
      remoteRef:
        key: "shared/harbor"
        property: "password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shisha-guid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: backend
          image: harbor.api-api-api.com/shisha/backend:main-12-5210be3c7cab032df7eb9f80015de272faa2c222 # {"$imagepolicy": "flux-system:shisha-backend"}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: MINIO_ENDPOINT
              value: minio.shisha-guid.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: MINIO_BUCKET
              value: shisha-guid
            - name: MINIO_SECURE
              value: "false"
            - name: API_PUBLIC_URL
              value: https://shisha-guid-api.api-api-api.com
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shisha-guid
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: shisha-guid
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/hostname: shisha-guid-api.api-api-api.com
    external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - shisha-guid-api.api-api-api.com
      secretName: shisha-guid-api-tls
  rules:
    - host: shisha-guid-api.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
