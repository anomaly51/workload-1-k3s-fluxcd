apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  namespace: downloader-sloniara-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: downloader-sloniara-bot
  template:
    metadata:
      labels:
        app: downloader-sloniara-bot
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: copy-session
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /session-secret/prod_user.session /session/prod_user.session && chmod 600 /session/prod_user.session
          volumeMounts:
            - name: bot-session
              mountPath: /session-secret
              readOnly: true
            - name: writable-session
              mountPath: /session
      containers:
        - name: bot
          image: harbor.api-api-api.com/downloader-sloniara-bot/bot:main-33-fa8720b8a7b788ad5d3571b4740b6363dd6bb09b # {"$imagepolicy": "flux-system:downloader-sloniara-bot"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: bot-env
          env:
            - name: APP_ENV
              value: prod
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SESSION_NAME
              value: /app/session/prod_user
            - name: PROXY_DOWNLOADER_TIMEOUT
              value: "120"
            - name: PROXY_AUTO_JOIN_SPONSORS
              value: "true"
            - name: PROXY_DEBUG_LOG
              value: /app/logs/proxy_bot_downloader.log
            - name: SEND_CONTENT_TIMEOUT
              value: "180"
          volumeMounts:
            - name: writable-session
              mountPath: /app/session
            - name: logs
              mountPath: /app/logs
            - name: downloads
              mountPath: /app/downloads
            - name: content
              mountPath: /app/content
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: bot-session
          secret:
            secretName: bot-session
        - name: writable-session
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: content
          emptyDir: {}
