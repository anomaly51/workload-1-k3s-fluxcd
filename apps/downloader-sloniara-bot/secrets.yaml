apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-env
  namespace: downloader-sloniara-bot
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bot-env
    creationPolicy: Owner
  data:
    - secretKey: SESSION_NAME
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "session_name"
    - secretKey: API_ID
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "api_id"
    - secretKey: API_HASH
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "api_hash"
    - secretKey: PHONE_NUMBER
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "phone_number"
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "openai_api_key"
    - secretKey: PROXY_DOWNLOADER_BOT
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "proxy_downloader_bot"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-session
  namespace: downloader-sloniara-bot
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bot-session
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        prod_user.session: "{{ .prod_user_session_b64 | b64dec }}"
  data:
    - secretKey: prod_user_session_b64
      remoteRef:
        key: "workload-1/downloader-sloniara-bot"
        property: "prod_user_session_b64"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: downloader-sloniara-bot
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.api-api-api.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: "shared/harbor"
        property: "username"
    - secretKey: password
      remoteRef:
        key: "shared/harbor"
        property: "password"
