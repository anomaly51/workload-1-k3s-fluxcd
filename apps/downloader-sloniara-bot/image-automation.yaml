apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: downloader-sloniara-bot
  namespace: flux-system
spec:
  image: harbor.api-api-api.com/downloader-sloniara-bot/bot
  interval: 1m
  secretRef:
    name: harbor-image-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: downloader-sloniara-bot
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: downloader-sloniara-bot
  filterTags:
    pattern: '^main-(?P<build>[0-9]+)-.*$'
    extract: '$build'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: downloader-sloniara-bot
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxbot
        email: flux@anomaly51
      messageTemplate: "chore: update downloader-sloniara-bot image"
    push:
      branch: main
  update:
    path: ./apps/downloader-sloniara-bot
    strategy: Setters
